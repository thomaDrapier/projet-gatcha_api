<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatcha - Tableau de bord</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-page">

    <nav class="topbar">
        <div class="logo">Gatcha<span>World</span></div>
        <div class="welcome-msg">Bienvenue, <strong id="display-username">Joueur</strong></div>
        <button id="btn-logout" class="danger-btn outline">Déconnexion</button>
    </nav>

    <div class="dashboard-container" style="display: flex; min-height: calc(100vh - 70px);">
        
        <aside class="history-sidebar">
            <div class="sidebar-header">
                <h3>🎬 Replay des combats</h3>
            </div>
            <div class="sidebar-content" style="margin-top: 15px;">
                
                <div id="battleHistoryList" class="battle-list-container">
                </div>

                <div id="battleLogContainer" style="display: none;">
                    <button onclick="closeReplay()" class="action-btn outline" style="width: 100%; margin-bottom: 15px; padding: 8px;">
                        ⬅ Retour à la liste
                    </button>
                    <div id="replay-arena-content">
                    </div>
                </div>

            </div>
        </aside>    
        
        <main class="main-dashboard" style="flex: 1; padding: 20px; overflow-y: auto;">
            <div class="dashboard">
                
                <section class="panel full-width">
                    <div class="panel-header">
                        <h3>Mes Personnages</h3>
                    </div>
                    
                    <div class="character-forms">
                        <div class="form-group">
                            <input type="text" id="create-char-name" placeholder="Invoquer un héros (Nom)">
                            <button id="btn-create-char" class="action-btn glow">Créer</button>
                        </div>

                        <div class="form-group">
                            <input type="text" id="delete-char-name" placeholder="Sacrifier un héros (Nom)">
                            <button id="btn-delete-char" class="danger-btn">Supprimer</button>
                        </div>
                    </div>

                    <div id="characters-list" class="characters-grid"></div>
                </section>

                <section class="panel full-width" style="margin-top: 30px;">
                    <div class="panel-header">
                        <h3>⚔️ Arène de Combat</h3>
                    </div>
                    
                    <div class="arena-selection-container">
                        <div class="arena-column">
                            <h3 style="text-align: center; color: var(--primary); margin-bottom: 15px;">Attaquant</h3>
                            <div id="arena-m1-list" class="monster-select-list">
                                </div>
                        </div>
                        
                        <div class="arena-vs-divider">VS</div>
                        
                        <div class="arena-column">
                            <h3 style="text-align: center; color: var(--danger); margin-bottom: 15px;">Défenseur</h3>
                            <div id="arena-m2-list" class="monster-select-list">
                                </div>
                        </div>
                    </div>

                    <div style="text-align: center; margin-bottom: 25px;">
                        <button id="btn-fight" onclick="startBattle()" class="action-btn glow" style="padding: 12px 60px; font-size: 1.1rem; letter-spacing: 1px;">LANCER LE COMBAT</button>
                    </div>
                    <div id="battle-display" class="hidden" style="background: rgba(0,0,0,0.4); padding: 25px; border-radius: 16px; border: 1px solid var(--glass-border);">
                        <h2 id="battle-status" class="text-center" style="margin-bottom: 20px; color: var(--white); text-transform: uppercase; letter-spacing: 2px;">Préparation...</h2>
                        
                        <div class="battle-arena">
                            </div>

                        <div id="battle-logs" style="height: 180px; overflow-y: auto; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 1px solid var(--glass-border); font-family: 'Courier New', monospace; font-size: 0.95rem; color: #ecf0f1;">
                            <p style="color: grey; font-style: italic;">En attente du signal...</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box glass">
            <button id="close-modal" class="close-btn">✖</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <div id="summon-modal" class="modal-overlay hidden">
        <div id="monster-reveal-area" class="text-center hidden"></div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
