<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatcha - Connexion</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-box">
        <h1>Gatcha<span>World</span></h1>
        
        <div id="auth-message" class="msg-box"></div>

        <form id="login-form">
            <h2>Connexion</h2>
            <input type="text" id="login-username" placeholder="Nom d'utilisateur" required>
            <input type="password" id="login-password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
            <p class="switch-form">Pas encore de compte ? <a href="#" id="show-register">Créer un profil</a></p>
        </form>

        <form id="register-form" style="display: none;">
            <h2>Créer un compte</h2>
            <input type="text" id="reg-username" placeholder="Nom d'utilisateur" required>
            <input type="password" id="reg-password" placeholder="Mot de passe" required>
            <input type="password" id="reg-confirm" placeholder="Confirmer le mot de passe" required>
            <button type="submit">S'inscrire</button>
            <p class="switch-form">Déjà un compte ? <a href="#" id="show-login">Retour à la connexion</a></p>
        </form>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
